name: Deploy

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install dx CLI
        run: |
          curl -L https://github.com/DioxusLabs/dioxus/releases/download/v0.7.6/dx-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C /usr/local/bin dx

      - name: Generate Tailwind CSS
        run: |
          curl -L https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.19/tailwindcss-linux-x64 -o /usr/local/bin/tailwindcss
          chmod +x /usr/local/bin/tailwindcss
          tailwindcss -i input.css -o assets/tailwind.css --minify

      - name: Build
        run: dx build --release

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy target/dx/gritty/release/web/public --project-name=gritty --commit-dirty=true
